# pytest.ini - Configuration for pytest

[pytest]
# Tell pytest where to find modules
pythonpath = .

# Async support
asyncio_mode = auto

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbosity
addopts = 
    -v
    --tb=short
    --strict-markers

# Markers (optional but good to have)
markers =
    asyncio: mark test as async
    slow: mark test as slow running